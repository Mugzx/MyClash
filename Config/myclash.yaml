# 分流策略组通用配置
group_common:
  group_common_select:
    &group_common_select {
      type: select,
      interval: 600,
      timeout: 3000,
      max-failed-times: 3,
      empty-fallback: REJECT,
      url: 'https://g.cn/generate_204',
      lazy: true,
    }

  group_common_auto:
    &group_common_auto {
      type: url-test,
      interval: 600,
      timeout: 3000,
      max-failed-times: 3,
      empty-fallback: REJECT,
      url: 'https://g.cn/generate_204',
      lazy: true,
      tolerance: 50,
      include-all: true,
      exclude-type: 'DIRECT',
      icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png',
      hidden: true,
    }

  group_common_load:
    &group_common_load {
      type: load-balance,
      interval: 600,
      timeout: 3000,
      max-failed-times: 3,
      empty-fallback: REJECT,
      url: 'https://g.cn/generate_204',
      lazy: true,
      strategy: 'sticky-sessions',
      include-all: true,
      exclude-type: 'DIRECT',
      icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Round_Robin.png',
      hidden: true,
    }

# 通用代理节点组
proxies_common:
  proxies_default:
    &proxies_default {
      proxies:
        [
          '默认代理',
          '自动选择',
          '负载均衡',
          '香港',
          '日本',
          '美国',
          '新加坡',
          '台湾省',
          '低倍率节点',
          '高倍率节点',
          '其他节点',
        ],
    }

  proxies_direct:
    &proxies_direct {
      proxies:
        [
          '默认代理',
          '自动选择',
          '负载均衡',
          '本地直连',
          '香港',
          '日本',
          '美国',
          '新加坡',
          '台湾省',
          '低倍率节点',
          '高倍率节点',
          '其他节点',
        ],
    }

# 定义地区过滤器正则表达式
group_filter:
  HK_filter: &HK_filter { filter: '🇭🇰|港|HK|[Hh]ong\s*[Kk]ong' }
  JP_filter: &JP_filter { filter: '🇯🇵|日本|JP|[Jj]apan' }
  US_filter: &US_filter { filter: '🇺🇸|美|US|[Aa]merica|[Uu]nited\s*[Ss]tates' }
  SG_filter: &SG_filter { filter: '🇸🇬|新加坡|狮城|SG|[Ss]ingapore' }
  TW_filter: &TW_filter { filter: '🇹🇼|台湾|TW|[Tt]aiwan' }
  low_filter:
    &low_filter {
      filter: '^(?!.*(?:剩|期|客户端|软件)).*(?:(?<!\d)0\.[0-5]|下载|低倍)',
    }
  high_filter:
    &high_filter {
      filter: '(?u)(?:[*×xX✕✖⨉]\s*(?:[2-9]\d*|[1-9]\d+)(?:\.\d+)?)|(?:(?<![\d.])(?:[2-9]\d*|[1-9]\d+)(?:\.\d+)?\s*(?:倍|[*×xX✕✖⨉]))',
    }
  exclude_filter:
    &exclude_filter {
      exclude-filter: '港|HK|🇭🇰|日本|JP|🇯🇵|美|US|🇺🇸|新加坡|SG|🇸🇬|台湾|TW|🇹🇼',
      exclude-type: 'DIRECT',
    }

# 定义分流策略组
proxy-groups:
  # 通用策略组
  - name: '默认代理'
    <<: *group_common_select
    proxies:
      [
        '香港',
        '日本',
        '美国',
        '新加坡',
        '台湾省',
        '低倍率节点',
        '高倍率节点',
        '其他节点',
        '自动选择',
        '负载均衡',
      ]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png'

  - name: '自动选择'
    <<: *group_common_auto

  - name: '负载均衡'
    <<: *group_common_load

  # 海外策略组
  - name: 'AI'
    <<: [*group_common_select, *proxies_default]
    default-selected: '美国'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AI.png'

  - name: 'FCM'
    <<: [*group_common_select, *proxies_direct]
    default-selected: '本地直连'
    icon: 'https://fastly.jsdelivr.net/gh/MiToverG422/Qure@master/IconSet/Color/fcm.png'

  - name: 'Games'
    <<: [*group_common_select, *proxies_direct]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Game.png'

  - name: 'GitHub'
    <<: [*group_common_select, *proxies_default]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/GitHub.png'

  - name: 'Google'
    <<: [*group_common_select, *proxies_default]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png'

  - name: 'Media'
    <<: [*group_common_select, *proxies_default]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Media.png'

  - name: 'Microsoft'
    <<: [*group_common_select, *proxies_direct]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Microsoft.png'

  - name: 'Telegram'
    <<: [*group_common_select, *proxies_default]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png'

  # 地区策略组
  - name: '香港'
    <<: [*group_common_select, *HK_filter]
    include-all: true
    proxies: ['香港-自动选择', '香港-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png'
  - name: '香港-自动选择'
    <<: [*group_common_auto, *HK_filter]
  - name: '香港-负载均衡'
    <<: [*group_common_load, *HK_filter]

  - name: '日本'
    <<: [*group_common_select, *JP_filter]
    include-all: true
    proxies: ['日本-自动选择', '日本-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png'
  - name: '日本-自动选择'
    <<: [*group_common_auto, *JP_filter]
  - name: '日本-负载均衡'
    <<: [*group_common_load, *JP_filter]

  - name: '美国'
    <<: [*group_common_select, *US_filter]
    include-all: true
    proxies: ['美国-自动选择', '美国-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png'
  - name: '美国-自动选择'
    <<: [*group_common_auto, *US_filter]
  - name: '美国-负载均衡'
    <<: [*group_common_load, *US_filter]

  - name: '新加坡'
    <<: [*group_common_select, *SG_filter]
    include-all: true
    proxies: ['新加坡-自动选择', '新加坡-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png'
  - name: '新加坡-自动选择'
    <<: [*group_common_auto, *SG_filter]
  - name: '新加坡-负载均衡'
    <<: [*group_common_load, *SG_filter]

  - name: '台湾省'
    <<: [*group_common_select, *TW_filter]
    include-all: true
    proxies: ['台湾省-自动选择', '台湾省-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png'
  - name: '台湾省-自动选择'
    <<: [*group_common_auto, *TW_filter]
  - name: '台湾省-负载均衡'
    <<: [*group_common_load, *TW_filter]

  - name: '低倍率节点'
    <<: [*group_common_select, *low_filter]
    include-all: true
    proxies: ['低倍率节点-自动选择', '低倍率节点-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available_1.png'
  - name: '低倍率节点-自动选择'
    <<: [*group_common_auto, *low_filter]
  - name: '低倍率节点-负载均衡'
    <<: [*group_common_load, *low_filter]

  - name: '高倍率节点'
    <<: [*group_common_select, *high_filter]
    include-all: true
    proxies: ['高倍率节点-自动选择', '高倍率节点-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Airport.png'
  - name: '高倍率节点-自动选择'
    <<: [*group_common_auto, *high_filter]
  - name: '高倍率节点-负载均衡'
    <<: [*group_common_load, *high_filter]

  - name: '其他节点'
    <<: [*group_common_select, *exclude_filter]
    include-all: true
    proxies: ['其他节点-自动选择', '其他节点-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Server.png'
  - name: '其他节点-自动选择'
    <<: [*group_common_auto, *exclude_filter]
  - name: '其他节点-负载均衡'
    <<: [*group_common_load, *exclude_filter]

  # 特殊策略组
  - name: '本地直连'
    <<: *group_common_select
    proxies: ['DIRECT-IPv4-PREF', 'DIRECT-IPv6-PREF', 'DIRECT-ALL']
    url: 'https://connectivitycheck.platform.hicloud.com/generate_204'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Direct.png'

  - name: '广告拦截'
    <<: *group_common_select
    proxies: ['REJECT', 'REJECT-DROP', 'PASS']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AdBlack.png'

  - name: '漏网之鱼'
    <<: *group_common_select
    proxies: ['默认代理', '本地直连']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Puzzle.png'

# 路由分流规则
rules:
  # 禁用国外 QUIC 流量
  - AND,((NETWORK,UDP),(DST-PORT,443),(NOT,((OR,((RULE-SET,cn_additional),(RULE-SET,cn_ip,no-resolve)))))),REJECT

  # 私有网络直连
