# --- 锚点定义 (通用属性) ---
proxy_providers_common:
  &proxy_providers_common {
    type: http,
    interval: 86400,
    proxy: DIRECT,
    health-check:
      {
        enable: true,
        url: https://g.cn/generate_204,
        interval: 600,
        lazy: true,
      },
  }

# 全局过滤节点
global_exclude_filter:
  &global_exclude_filter {
    exclude-filter: '(?i)(群|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|邀请|好友|失联|选择|剩余|公益|发布|DIZTNA|通路|登录|禁止|定时|渠道|牢记|永久|余额|阁下|本站|刷新|导航|建议|重置|以下|⚠️|@|expire|http|com|traffic)',
  }

# 定义节点代理集，可配置多个订阅
proxy-providers:
  provider1:
    <<: [*proxy_providers_common, *global_exclude_filter]
    url: '' # 订阅链接
    age-secret-key: '' # Age加密
    path: ./proxy_provider/1.yaml
    override:
      additional-prefix: 'p1 | ' # 添加前缀

# 自定义节点配置
proxies:
  # 直连
  - { name: 'DIRECT-IPv4-PREF', type: direct, ip-version: ipv4-prefer }
  - { name: 'DIRECT-IPv6-PREF', type: direct, ip-version: ipv6-prefer }
  - { name: 'DIRECT-ALL', type: direct }

# 基础全局配置
allow-lan: true
ipv6: true
mode: rule
log-level: warning
bind-address: '*'
unified-delay: true
tcp-concurrent: true
keep-alive-idle: 600
keep-alive-interval: 60
find-process-mode: strict
external-controller: '127.0.0.1:9090'
external-ui: ui
external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip'

profile:
  store-selected: true
  store-fake-ip: true

# 国内外 DNS 定义
chinaDNS:
  &chinaDNS ['https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query']
foreignDNS:
  &foreignDNS [
    'https://dns.cloudflare.com/dns-query#默认代理',
    'https://dns.google/dns-query#默认代理',
  ]

dns:
  enable: true
  ipv6: true
  use-hosts: true
  cache-algorithm: arc
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: ['rule-set:private', 'rule-set:fakeip_filter']
  proxy-server-nameserver: *chinaDNS
  default-nameserver: ['223.5.5.5', '119.29.29.29']
  nameserver: *foreignDNS
  nameserver-policy:
    'rule-set:cn': *chinaDNS
  direct-nameserver: ['system', '223.5.5.5', '119.29.29.29']

hosts:
  'dns.alidns.com': ['223.5.5.5', '223.6.6.6']
  'doh.pub': ['1.12.12.21', '1.12.12.12']
  'dns.cloudflare.com': ['1.1.1.1', '1.0.0.1']
  'dns.google': ['8.8.8.8', '8.8.4.4']

  # 解决谷歌商店无法下载的问题
  'services.googleapis.cn': ['services.googleapis.com']

  # 屏蔽哔哩哔哩PCDN，解决访问视频卡顿问题
  '+.mcdn.bilivideo.cn': ['0.0.0.0']
  '+.edge.mountaintoys.cn': ['0.0.0.0']

ntp:
  enable: true
  write-to-system: false
  server: 'ntp.aliyun.com'
  port: 123
  interval: 60

tun:
  enable: true
  stack: system
  auto-route: true
  strict-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack: ['any:53', 'tcp://any:53']

# 分流规则集通用配置
rule_providers_common:
  rule_providers_domain:
    &rule_providers_domain {
      type: http,
      format: mrs,
      interval: 86400,
      behavior: domain,
    }
  rule_providers_ip:
    &rule_providers_ip {
      type: http,
      format: mrs,
      interval: 86400,
      behavior: ipcidr,
    }

# 定义分流规则集
rule-providers:
  # 基础规则集
  fakeip_filter:
    <<: *rule_providers_domain
    url: 'https://fastly.jsdelivr.net/gh/wwqgtxx/clash-rules@release/fakeip-filter.mrs'
